<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Messages | KylianShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navigation placeholder -->
    <div id="header-placeholder"></div>

    <div class="container" style="padding-top: 100px;">
        <h1 class="mb-4">Your Messages</h1>
        <div id="messages-container">
            <!-- messages will be injected here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        refreshNavAuth();
        loadMessages();
    });

    async function loadMessages() {
        const container = document.getElementById('messages-container');
        if (!localStorage.getItem('kylian_token')) {
            container.innerHTML = '<p>Please sign in to view your messages.</p>';
            return;
        }
        try {
            const msgs = await api.get('/user/messages');
            if (msgs.length === 0) {
                container.innerHTML = '<p>No messages at this time.</p>';
                return;
            }
            let html = '<div class="list-group">';
            msgs.forEach(m => {
                html += `<div class="list-group-item">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1">${m.subject}</h5>
                        <small>${new Date(m.created_at).toLocaleString()}</small>
                    </div>
                    <p class="mb-1">${m.message}</p>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<p class="text-danger">${err.message}</p>`;
        }
    }
    </script>
</body>
</html>
