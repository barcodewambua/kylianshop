<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | KylianShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navigation placeholder -->
    <div id="header-placeholder"></div>

    <div class="container" style="padding-top: 100px;">
        <h1 class="mb-4">Admin Panel</h1>
        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="adminTabs">
            <li class="nav-item"><button class="nav-link active" data-bs-target="#products-tab" data-bs-toggle="tab">Products</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-target="#orders-tab" data-bs-toggle="tab">Orders</button></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="products-tab">
                <h3>Add New Product</h3>
                <form id="product-form" class="row gy-3">
                    <div class="col-md-6">
                        <label>Name</label>
                        <input type="text" id="prod-name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label>Price</label>
                        <input type="number" id="prod-price" class="form-control" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label>Image URL</label>
                        <input type="text" id="prod-image" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Category</label>
                        <input type="text" id="prod-category" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Stock</label>
                        <input type="number" id="prod-stock" class="form-control" value="0">
                    </div>
                    <div class="col-12">
                        <label>Description</label>
                        <textarea id="prod-desc" class="form-control"></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Add Product</button>
                    </div>
                </form>
                <hr>
                <h3>Existing Products</h3>
                <div id="product-list"></div>
            </div>
            <div class="tab-pane fade" id="orders-tab">
                <h3>Orders</h3>
                <div id="order-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
    <div id="footer-auth-placeholder"></div>
</body>
</html>
