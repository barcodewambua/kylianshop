<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | KylianShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation placeholder -->
    <div id="header-placeholder"></div>

    <!-- Cart Page Header -->
    <div class="bg-light py-5 mt-5">
        <div class="container text-center pt-4">
            <h1 class="display-6 fw-bold font-heading mb-2">Shopping Cart</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb justify-content-center mb-0 text-uppercase tracking-widest" style="font-size: 0.8rem;">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-muted">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Cart</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Cart Content -->
    <section class="section-padding flex-grow-1" style="margin-top: 40px; margin-bottom: 40px;">
        <div class="container">
            <div class="row g-5">
                <!-- Cart Items -->
                <div class="col-lg-8">
                    <!-- Heading -->
                    <div class="d-none d-md-block border-bottom pb-3 mb-4 text-uppercase tracking-widest text-muted fs-7">
                        <div class="row">
                            <div class="col-6">Product</div>
                            <div class="col-2 text-center">Price</div>
                            <div class="col-3 text-center">Quantity</div>
                            <div class="col-1"></div>
                        </div>
                    </div>
                    
                    <!-- Dynamic Container controlled by cart.js -->
                    <div id="cart-items-container">
                        <!-- Loading spinner -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-dark" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="card bg-light border-0 rounded-0 p-4 sticky-top" style="top: 100px;" id="cart-summary" style="display: none;">
                        <h4 class="font-heading mb-4 text-uppercase tracking-widest fs-6 fw-bold">Order Summary</h4>
                        
                        <div class="d-flex justify-content-between mb-3 text-dark">
                            <span>Subtotal</span>
                            <span class="fw-medium" id="cart-subtotal">$0.00</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-4 pb-4 border-bottom text-muted">
                            <span>Standard Shipping</span>
                            <span>$10.00</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-4 text-dark fs-5 fw-bold">
                            <span>Total</span>
                            <span id="cart-total">$0.00</span>
                        </div>

                        <a href="checkout.html" class="btn btn-primary w-100 py-3 text-uppercase tracking-widest fw-bold">Proceed To Checkout</a>
                        
                        <div class="mt-4 pt-3 border-top text-center text-muted fs-7">
                            <i class="bi bi-shield-check me-1"></i> Secure Checkout
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer bg-secondary bg-opacity-10 pt-5 mt-auto">
        <div class="container py-4 border-bottom text-center">
             <h4 class="mb-2 text-dark font-heading fw-bold">KYLIAN</h4>
             <p class="text-muted small">Elevating everyday essentials.</p>
        </div>
        <div id="footer-auth-placeholder"></div>
        <div class="container py-3 text-center">
            <p class="text-muted small mb-0">&copy; 2026 KylianShop. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
</body>
</html>
